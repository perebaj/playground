services:
  payload-sizer:
    image: python:3.12-slim
    container_name: payload-sizer-dev
    volumes:
      - ./payload-sizer.py:/app/payload-sizer.py:ro
    command: ["sh", "-c", "pip install --quiet cramjam && python3 /app/payload-sizer.py"]
    networks:
      - repro-net

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.131.0
    container_name: otel-collector-dev-large-batch
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config-dev-large-batch.yaml:/etc/otel-collector-config.yaml:ro
    environment:
      - OLLY_GARDEN_API_KEY=${OLLY_GARDEN_API_KEY}
    ports:
      - "4317:4317"
    depends_on:
      - payload-sizer
    networks:
      - repro-net
    deploy:
      resources:
        limits:
          memory: 4G

  # --- LOG GENERATORS ---
  # Multiple services with rich attributes to produce realistic, diverse log records.
  # High rate + large batch processor = large OTLP export payloads to test 64MB limits.

  log-gen-api:
    image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:v0.131.0
    container_name: log-gen-dev-api
    command:
      - logs
      - --otlp-endpoint=otel-collector:4317
      - --otlp-insecure
      - --workers=3
      - --rate=2000
      - --duration=300s
      - --severity-text=INFO
      - --body=[api-gateway] POST /api/v2/orders request_id=abf9c2e1-7d3f-4a8b-b6e2-9c1d5f8a3e7b user_id=usr_8x7k2m status=200 latency_ms=142 region=eu-west-1 pod=api-gw-5d8f9-xk2m4 trace_id=4bf92f3577b34da6a3ce929d0e0e4736 span_id=00f067aa0ba902b7 correlation_id=corr_m9x2k4 upstream_latency_ms=89 downstream_latency_ms=53 cache_hit=false rate_limit_remaining=847 request_body_size=4521 response_body_size=892
      - --telemetry-attributes=service.name="api-gateway",service.version="2.14.3",deployment.environment="development",host.name="api-gw-5d8f9-xk2m4",cloud.region="eu-west-1",cloud.provider="gcp",k8s.namespace.name="gateway",k8s.pod.name="api-gw-5d8f9-xk2m4",k8s.deployment.name="api-gateway",k8s.cluster.name="prod-eu-01",service.instance.id="i-0a1b2c3d4e5f",process.pid="1842",process.runtime.name="go",process.runtime.version="1.22.1"
      - --otlp-attributes=http.method="POST",http.route="/api/v2/orders",http.status_code="200",http.scheme="https",http.flavor="2.0",http.target="/api/v2/orders?include=items,shipping",user.tier="enterprise",user.org_id="org_k2m9x",request.size_bytes="4521",response.size_bytes="892",net.host.name="api.example.com",net.host.port="443",net.peer.ip="203.0.113.42",net.peer.port="52341"
    depends_on: [otel-collector]
    networks: [repro-net]

  log-gen-api-2:
