# Dev environment test: large batches targeting dev endpoint.
# Validates the 64MB pipeline limits (nginx, raincatcher, NATS).
# Also exports to a local payload-sizer to log raw protobuf sizes.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        include_metadata: true
      http:
        endpoint: 0.0.0.0:4318
        include_metadata: true

processors:
  memory_limiter:
    check_interval: 5s
    limit_percentage: 95
    spike_limit_percentage: 30

  batch/logs_export:
    send_batch_size: 100000
    send_batch_max_size: 100000
    timeout: 8s

exporters:
  otlphttp/ollygarden-dev:
    endpoint: https://in-dev.ollygarden.cloud
    headers:
      Authorization: "Bearer ${env:OLLY_GARDEN_API_KEY}"

  # Local payload sizer — logs raw protobuf size per export
  otlphttp/sizer:
    endpoint: http://payload-sizer:4319
    compression: none

  debug:
    verbosity: basic

service:
  extensions: []
  pipelines:
    logs:
      receivers:
        - otlp
      processors:
        - memory_limiter
        - batch/logs_export
      exporters:
        - otlphttp/ollygarden-dev
        - otlphttp/sizer
        - debug

  telemetry:
    logs:
      level: info
