# Aggressive demo settings — small lagThreshold + short cooldown so scaling
# happens within a minute of publishing. For a realistic cluster you'd
# typically set lagThreshold in the thousands and cooldown around 5 minutes.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: slow-consumer
  namespace: demo
spec:
  scaleTargetRef:
    name: slow-consumer
  minReplicaCount: 1
  maxReplicaCount: 5
  pollingInterval: 10    # poll NATS every 10s
  cooldownPeriod: 60     # 1min dwell before allowing scale-down
  triggers:
    - name: pending
      type: nats-jetstream
      metadata:
        natsServerMonitoringEndpoint: nats-headless.nats.svc.cluster.local:8222
        account: "$G"
        stream: test-stream
        consumer: slow-consumer
        lagThreshold: "10"
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
            - type: Percent
              value: 100
              periodSeconds: 15
        scaleDown:
          stabilizationWindowSeconds: 60
          policies:
            - type: Percent
              value: 50
              periodSeconds: 30
